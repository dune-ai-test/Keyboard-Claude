name: Verify Keystore Secrets

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check KEY_ALIAS
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [ -z "$KEY_ALIAS" ]; then
            echo "❌ KEY_ALIAS is not set"
            exit 1
          fi
          echo "✅ KEY_ALIAS is set"

      - name: Check KEY_PASSWORD
        env:
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEY_PASSWORD" ]; then
            echo "❌ KEY_PASSWORD is not set"
            exit 1
          fi
          echo "✅ KEY_PASSWORD is set"

      - name: Check KEYSTORE_PASSWORD
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "❌ KEYSTORE_PASSWORD is not set"
            exit 1
          fi
          echo "✅ KEYSTORE_PASSWORD is set"

      - name: Check KEYSTORE_BASE64
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "❌ KEYSTORE_BASE64 is not set"
            exit 1
          fi
          echo "✅ KEYSTORE_BASE64 is set"

      - name: Decode and verify keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.keystore
          if keytool -list -keystore /tmp/release.keystore -storepass "$KEYSTORE_PASSWORD" > /dev/null 2>&1; then
            echo "✅ Keystore decoded successfully"
          else
            echo "❌ Keystore decode failed - invalid KEYSTORE_BASE64 or KEYSTORE_PASSWORD"
            exit 1
          fi

          if keytool -list -keystore /tmp/release.keystore -storepass "$KEYSTORE_PASSWORD" -alias "$KEY_ALIAS" > /dev/null 2>&1; then
            echo "✅ Key alias '$KEY_ALIAS' found in keystore"
          else
            echo "❌ Key alias '$KEY_ALIAS' not found in keystore"
            keytool -list -keystore /tmp/release.keystore -storepass "$KEYSTORE_PASSWORD" 2>/dev/null | grep "Alias name"
            exit 1
          fi

          rm -f /tmp/release.keystore
          echo "✅ All keystore secrets are correct"
